      {/* Scenarios */}

        {SCENARIOS.map(s => (
          <div key={s.key} className={`scenario-card ${s.goal?"goal":""}`}
            style={{ borderLeftWidth:4, borderLeftColor:s.color, borderLeftStyle:"solid" }}>
            <div style={{ fontSize:10, fontWeight:700, color:s.color, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>
              {s.label} {s.goal && "🎯"}
            </div>
            <div style={{ fontFamily:"'DM Mono',monospace", fontSize:28, fontWeight:500, color:"#111", lineHeight:1 }}>{s.time}</div>
            <div style={{ fontSize:13, color:s.color, marginTop:4, marginBottom:8, fontFamily:"'DM Mono',monospace" }}>{s.pace}</div>
            <div style={{ fontSize:12, color:"#888", lineHeight:1.5 }}>{s.desc}</div>
          </div>
        ))}
      </div>

      {/* Fitness projection */}
      <div className="card">
        <div className="card-label">Forma projetada — CTL e TSB</div>
        <ResponsiveContainer width="100%" height={180}>
          <LineChart data={FITNESS_PROJ} margin={{top:4,right:8,bottom:0,left:-24}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
            <XAxis dataKey="w" tick={{fill:"#bbb", fontSize:9}} />
            <YAxis tick={{fill:"#bbb", fontSize:10}} />
            <Tooltip {...TT} />
            <ReferenceLine y={15} stroke="#94D82D" strokeDasharray="4 3" label={{value:"TSB min",fill:"#94D82D",fontSize:9}} />
            <ReferenceLine y={25} stroke="#94D82D" strokeDasharray="4 3" label={{value:"TSB max",fill:"#94D82D",fontSize:9}} />
            <ReferenceLine y={0}  stroke="#e0e0e0" />
            <Line type="monotone" dataKey="ctl" stroke="#4DABF7" strokeWidth={2} dot={false} name="CTL" />
            <Line type="monotone" dataKey="tsb" stroke="#FCC419" strokeWidth={2.5} dot={{r:3,fill:"#FCC419"}} name="TSB" />
          </LineChart>
        </ResponsiveContainer>
      </div>

      {/* Pace strategy */}
      <div className="card">
        <div className="card-label">Estratégia de Pace · Negative Split</div>
        <div style={{ fontSize:12, color:"#888", marginBottom:14 }}>
          1ª metade 1:24:30 (4:01/km) · 2ª metade 1:23:30 (3:58/km)
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
          {PACE_STRATEGY.map((s,i) => (
            <div key={i} style={{
              display:"flex", alignItems:"center", gap:12, padding:"8px 12px",
              borderRadius:8, background: i >= 6 ? "#FFF5F5" : "#fafafa",
            }}>
              <div style={{ fontSize:11, color:"#bbb", width:42, flexShrink:0, fontFamily:"'DM Mono',monospace" }}>km {s.km}</div>
              <div style={{ fontFamily:"'DM Mono',monospace", fontSize:16, fontWeight:500, color: i>=6 ? "#FF3333" : "#111", width:44 }}>{s.pace}</div>
              <div style={{ fontSize:11, color:"#FF922B", fontFamily:"'DM Mono',monospace", width:80 }}>{s.pw}</div>
              <div style={{ fontSize:12, color:"#888" }}>{s.note}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Nutrition */}
      <div className="card">
        <div className="card-label">Protocolo de Nutrição · Race Day</div>
        <div style={{ fontSize:11, color:"#888", marginBottom:14 }}>
          ~150–180g CHO total · Mistura glicose:frutose 2:1 · Sódio 500mg/h
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:0 }}>
          {NUTRITION.map((n,i) => (
            <div key={i} style={{ display:"flex", gap:12, alignItems:"flex-start", padding:"10px 0", borderBottom: i<NUTRITION.length-1 ? "1px solid #f5f5f5" : "none" }}>
              <div style={{ background:"#f0f0f0", borderRadius:8, padding:"4px 10px", fontSize:11, fontWeight:700, color:"#111", fontFamily:"'DM Mono',monospace", minWidth:52, textAlign:"center", flexShrink:0 }}>{n.time}</div>
              <div style={{ fontSize:16, flexShrink:0 }}>{n.icon}</div>
              <div>
                <div style={{ fontSize:13, fontWeight:600, color:"#111" }}>{n.action}</div>
                <div style={{ fontSize:12, color:"#888", marginTop:1 }}>{n.detail}</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{ marginTop:12, padding:"12px 14px", background:"#f8f8f6", borderRadius:10, fontSize:12, color:"#888", lineHeight:1.6 }}>
          💧 <b style={{ color:"#111" }}>Hidratação:</b> 400–500ml/h esperado em Chicago (~10°C). Eueidratação na manhã — urina clara. Não beber em excesso: risco de hiponatremia.
        </div>
      </div>

      {/* Mental strategy */}
      <div className="card" style={{ background:"#111", color:"#fff", border:"none" }}>
        <div className="card-label" style={{ color:"#555" }}>Estratégia Mental · 4 Fases</div>
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {[
            { km:"0–10",   label:"Paciência",   desc:"Ignore o pelotão. Power é o chefe. Se parecer fácil — ótimo.", c:"#4DABF7" },
            { km:"10–21",  label:"Ritmo",        desc:"Negative split começa aqui. 4:00/km sentido confortável.", c:"#94D82D" },
            { km:"21–32",  label:"Comprometer",  desc:"Esta é a corrida. Gel+cafeína km 24. Pense só no próximo km.", c:"#FCC419" },
            { km:"32–42",  label:"Sobreviver 🔥",desc:"Dor é normal. Diminua passada se necessário, não pare.", c:"#FF3333" },
          ].map((f,i) => (
            <div key={i} style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
              <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:f.c, width:44, paddingTop:2, flexShrink:0 }}>km {f.km}</div>
              <div>
                <div style={{ fontSize:13, fontWeight:700, color:f.c }}>{f.label}</div>
                <div style={{ fontSize:12, color:"#888", marginTop:2, lineHeight:1.5 }}>{f.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const PAGES = [
  { id:"overview", icon:"⬤", label:"Visão Geral",   component:PageOverview  },
  { id:"fitness",  icon:"📈", label:"Fitness",       component:PageFitness   },
  { id:"zones",    icon:"◉",  label:"Zonas",         component:PageZones     },
  { id:"plan",     icon:"▦",  label:"Plano 15sem",   component:PagePlan      },
  { id:"projecao", icon:"🎯", label:"Projeção",      component:PageProjecao  },
];

function App() {
  const [page, setPage] = useState("overview");
  const Current = PAGES.find(p => p.id === page)?.component || PageOverview;

  return (
    <div className="app-shell">
      {/* Desktop sidebar */}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="race-target">2:48:00</div>
          <div className="race-label">Chicago Marathon · Out 11</div>
          <div className="race-days">
            <span>{DAYS_OUT}</span> dias · <span>{Math.ceil(DAYS_OUT/7)}</span> semanas
          </div>
        </div>
        <nav className="sidebar-nav">
          {PAGES.map(p => (
            <button key={p.id} className={`nav-item ${page===p.id?"active":""}`}
              onClick={() => setPage(p.id)}>
              <span className="nav-icon">{p.icon}</span>
              {p.label}
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <p>GPS · VDOT 58 · LT2 393W<br/>Stryd · Garmin · Strava<br/>Strava sync Jul 11 2026</p>
        </div>
      </aside>

      {/* Mobile header + tabs */}
      <div style={{ display:"flex", flexDirection:"column", flex:1 }}>
        <header className="mobile-header">
          <div className="logo">2:48:00</div>
          <div style={{ fontSize:11, color:"#888" }}>Chicago · {DAYS_OUT}d</div>
        </header>
        <div className="mobile-tabs">
          {PAGES.map(p => (
            <button key={p.id} className={`mobile-tab ${page===p.id?"active":""}`}
              onClick={() => setPage(p.id)}>
              {p.label}
            </button>
          ))}
        </div>

        {/* Page content */}
        <main className="main-content">
          <Current />
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
