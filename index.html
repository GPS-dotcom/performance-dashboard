<style>

    --page: #f9f9f7; --surface-card: #ffffff; --surface-alt: #ffffff;

    --border: rgba(11,11,11,0.10); --divider: rgba(11,11,11,0.06); --baseline: #c3c2b7;
    --accent: #2a78d6; --accent-soft: #c9d9f0; --highlight-bg: #eef4fc;
    --z1: #2a78d6; --z2: #1baf7a; --z3: #eda100; --z4: #eb6834; --z5: #e34948;
    --good: #0ca30c; --warning: #c98500;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body { background: var(--page); font-family: 'Inter', system-ui, sans-serif; color: var(--text-primary); min-height: 100vh; font-variant-numeric: proportional-nums; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  button { font-family: inherit; cursor: pointer; }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 60px; }

  header.top { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 14px; margin-bottom: 22px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.14em; color: var(--text-muted); text-transform: uppercase; }
  h1 { font-weight: 700; font-size: 26px; letter-spacing: -0.01em; margin: 4px 0 0; }
  .race-days { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  .race-days b { color: var(--text-primary); }

  .sync-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .sync-btn {
    display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #fff;
    border: none; padding: 9px 16px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer;
    white-space: nowrap;
  }
  .sync-btn:hover { filter: brightness(1.08); }
  .sync-btn:disabled { opacity: 0.6; cursor: default; }
  .last-sync { font-size: 11px; color: var(--text-muted); text-align: right; }

  .tab-nav { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 22px; overflow-x: auto; }
  .tab-btn {
    font-size: 12.5px; color: var(--text-muted); background: transparent; border: none;
    padding: 10px 4px; margin-right: 22px; cursor: pointer; position: relative; top: 1px;
    border-bottom: 2px solid transparent; white-space: nowrap; font-weight: 500;
  }
  .tab-btn:hover { color: var(--text-primary); }
  .tab-btn.active { color: var(--text-primary); border-bottom-color: var(--accent); font-weight: 600; }

  .page { padding: 0; max-width: 1180px; }
  .page-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }

  .card { background: var(--surface-card); border-radius: 12px; border: 1px solid var(--border); padding: 18px 20px; }
  .card-label { font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 14px; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
  .gap-14 { display: flex; flex-direction: column; gap: 14px; }

  .lap-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .lap-table th {
    padding: 8px 10px; text-align: left; font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-muted); font-weight: 400; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap;

  .lap-table th:hover { color: var(--text-primary); }
  .lap-table th.sorted::after { content: " " attr(data-dir); color: var(--accent); }
  .lap-table td { padding: 9px 10px; border-bottom: 1px solid var(--divider); color: var(--text-secondary); }
  .lap-table tr:last-child td { border-bottom: none; }
  .lap-table tr:hover td { background: var(--divider); }

  .zone-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 12px; }

  .kpi .delta.down { color: var(--z5); }

  .lw-stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 14px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

  .search-row { margin-bottom: 12px; }

  .footnote { font-size: 11.5px; color: var(--text-muted); margin-top: 4px; font-style: italic; }

  .tl-legend { display: flex; gap: 12px; flex-wrap: wrap; }

  .tl-cal-header { display: grid; grid-template-columns: repeat(7, 1fr) 150px; gap: 8px; font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 2px 8px; }
  .tl-week-row { display: grid; grid-template-columns: repeat(7, 1fr) 150px; gap: 8px; margin-bottom: 8px; }
  .tl-day { background: var(--surface-alt); border: 1px solid var(--border); border-radius: 9px; padding: 8px; min-height: 78px; cursor: pointer; display: flex; flex-direction: column; gap: 4px; transition: border-color 0.12s; }

  .tl-day-date { font-size: 10px; color: var(--text-muted); }
  .tl-day-tag { align-self: flex-start; font-size: 9.5px; font-weight: 600; padding: 2px 6px; border-radius: 4px; color: #ffffff; }
  .tl-week-summary { background: var(--surface-card); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; display: flex; flex-direction: column; justify-content: center; gap: 3px; }

  .tl-week-summary .v { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; font-family: 'DM Mono', monospace; }

  @media (max-width: 900px) {
    .kpi-row { grid-template-columns: repeat(2,1fr); }

  }
  @media (max-width: 520px) {
    .grid-3 { grid-template-columns: 1fr 1fr; }

  }
</style>

const RACE_DATE = new Date("2026-10-11");

// HR e pace vêm das zonas reais do perfil Strava (get_athlete_zones: MaxHR 5-zonas,
// pace por RacePace/meia maratona). Potência mantém o modelo de referência do app —

const ZONE_DEFS = [
  { zone:"Z1", label:"Recovery",  pw:"< 315W",    pwMax:315,          hr:"< 128bpm",  hrMax:127,          pace:"> 5:14/km",  paceFast:5.235, color:"#2a78d6", pct:80  },

  { zone:"Z3", label:"Tempo",     pw:"354–383W",  pwMax:383,          hr:"160–174",   hrMax:174,          pace:"4:03–4:30",  paceFast:4.046, color:"#eda100", pct:90  },

];

function parsePaceMin(str) {
  const m = String(str).match(/(\d+):(\d{1,2})/);
  return m ? parseInt(m[1],10) + parseInt(m[2],10)/60 : null;
}
function findZone(predicate) {
  return (ZONE_DEFS.find(predicate) || ZONE_DEFS[ZONE_DEFS.length-1]).zone;
}
function classifyActivityZone(a) {
  const watts = a.weighted_average_watts || a.average_watts;
  if (watts) return findZone(z => watts <= z.pwMax);
  if (a.average_heartrate) return findZone(z => a.average_heartrate <= z.hrMax);
  return null;
}

// Tempo real por zona vem de a.zone_minutes, calculado a partir dos streams
// do Strava pela Edge Function sync-strava (segundo a segundo, sem o
// mascaramento de média que treinos intervalados sofrem). Enquanto uma
// atividade ainda não tiver passado pelo backfill, cai de volta pra uma
// zona única estimada pela potência/FC média do treino inteiro.
function activityZoneMinutes(a) {
  const real = a.zone_minutes;
  if (real && Object.values(real).some(v => v > 0)) return real;
  const zone = classifyActivityZone(a);
  const out = { Z1:0, Z2:0, Z3:0, Z4:0, Z5:0 };
  if (zone) out[zone] = (a.moving_time_s||0)/60;
  return out;
}

const PLANNED_KEY = "gps_planned_workouts_v1";

const WORKOUT_KINDS = {
  Rest: { label:"Descanso",    color:"#ccc",    if:0,    zone:null },
  Easy: { label:"Easy/Z2",     color:"#4DABF7", if:0.75, zone:"Z2" },
  Long: { label:"Longão",      color:"#9775FA", if:0.80, zone:"Z2" },
  T:    { label:"Threshold",   color:"#E8A838", if:0.95, zone:"Z4" },

  St:   { label:"Strides",     color:"#06D6A0", if:1.05, zone:"Z5" },
  R:    { label:"R-pace",      color:"#9B5DE5", if:1.05, zone:"Z5" },
};
const INTERVAL_KINDS = ["T","CI","I","St","R"];

function estimateRtss(durationMin, kind) {
  const iF = WORKOUT_KINDS[kind]?.if ?? 0;
  return Math.round((durationMin/60) * iF*iF * 100);
}

function parseMmSs(str) {
  const m = String(str).match(/(\d+):(\d{1,2})/);
  if (m) return parseInt(m[1],10)*60 + parseInt(m[2],10);
  const n = parseFloat(str);
  return isNaN(n) ? 0 : Math.round(n*60);
}
function formatMmSs(totalSec) {
  const s = Math.round(totalSec||0);
  const m = Math.floor(s/60), sec = s%60;
  return `${m}:${String(sec).padStart(2,"0")}`;
}
function segmentDurationMin(seg) {
  if (!seg) return 0;
  if (seg.mode === "distance") {
    const paceMin = parsePaceMin(seg.pace);
    return (paceMin && seg.value) ? paceMin * seg.value : 0;
  }
  return seg.value || 0;
}
const EASY_IF = 0.7, REST_IF = 0.55;
function structuredDurationMin(f) {
  const wuMin = segmentDurationMin({ mode:f.wuMode, value:f.wuValue, pace:f.wuPace });
  const cdMin = segmentDurationMin({ mode:f.cdMode, value:f.cdValue, pace:f.cdPace });
  const seriesMin = (f.seriesReps||0) * (parseMmSs(f.seriesRepTime) + parseMmSs(f.seriesRestTime)) / 60;
  return wuMin + seriesMin + cdMin;
}
function estimateStructuredRtss(f, kind) {
  const wuMin = segmentDurationMin({ mode:f.wuMode, value:f.wuValue, pace:f.wuPace });
  const cdMin = segmentDurationMin({ mode:f.cdMode, value:f.cdValue, pace:f.cdPace });
  const repMin = (f.seriesReps||0) * parseMmSs(f.seriesRepTime) / 60;
  const restMin = (f.seriesReps||0) * parseMmSs(f.seriesRestTime) / 60;
  const seriesIF = WORKOUT_KINDS[kind]?.if ?? 0.9;
  const tss = (wuMin/60)*EASY_IF*EASY_IF*100
            + (repMin/60)*seriesIF*seriesIF*100
            + (restMin/60)*REST_IF*REST_IF*100
            + (cdMin/60)*EASY_IF*EASY_IF*100;
  return Math.round(tss);
}

// Datas representadas como "day number" (dias desde a epoch, via Date.UTC) para
// nunca depender do fuso horário do navegador — evita deslocar o race day.
const WEEK_MONTHS = { Jun:5, Jul:6, Ago:7, Set:8, Out:9 };
function dayNum(y, m, d) { return Math.floor(Date.UTC(y, m, d) / 86400000); }
function dayNumFromYMD(ymd) { const [y,m,d] = ymd.split("-").map(Number); return dayNum(y, m-1, d); }
function ymdFromDayNum(n) {
  const dt = new Date(n * 86400000);
  const y = dt.getUTCFullYear(), m = String(dt.getUTCMonth()+1).padStart(2,"0"), d = String(dt.getUTCDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
const WEEKDAY_PT = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
function weekdayPtFromDayNum(n) { return WEEKDAY_PT[new Date(n * 86400000).getUTCDay()]; }

function parseWeekRange(str, year=2026) {
  const [l, r] = str.split("–");
  const [lm, ld] = l.trim().split(" ");
  const startN = dayNum(year, WEEK_MONTHS[lm], parseInt(ld,10));
  const rParts = r.trim().split(" ");
  const endN = rParts.length === 2
    ? dayNum(year, WEEK_MONTHS[rParts[0]], parseInt(rParts[1],10))
    : dayNum(year, WEEK_MONTHS[lm], parseInt(rParts[0],10));
  return { startN, endN };
}

function computeFitnessForecast(pmc, plannedWorkouts, raceDate) {
  const last = pmc.length ? pmc[pmc.length-1] : null;
  let ctl = last?.ctl ?? 0, atl = last?.atl ?? 0;
  const today = new Date();
  const startN = last ? dayNumFromYMD(last.date) + 1 : dayNum(today.getFullYear(), today.getMonth(), today.getDate());
  const raceN = dayNum(raceDate.getUTCFullYear(), raceDate.getUTCMonth(), raceDate.getUTCDate());
  const byDate = {};
  plannedWorkouts.forEach(w => { byDate[w.date] = (byDate[w.date]||0) + (w.estRtss||0); });

  const out = [];
  for (let n = startN; n <= raceN; n++) {
    const tsb = ctl - atl;
    const dateStr = ymdFromDayNum(n);
    const tss = byDate[dateStr] || 0;
    ctl += (tss - ctl) / 42;
    atl += (tss - atl) / 7;
    out.push({ x: dateStr.slice(5), date: dateStr, ctl, atl, tsb });
  }
  return out;
}

// ─── PREDICTIONS (estimativa própria via Riegel, não vem do Garmin) ──────────
// Âncora real: Meia Maratona RJ 1:28:17 (PR do atleta). Riegel extrapola pra
// outras distâncias: T2 = T1 * (D2/D1)^1.06. VDOT e LT2 seguem sendo as
// referências manuais já usadas no resto do app (não há conector Garmin).
const ANCHOR_KM = 21.0975, ANCHOR_SEC = 1*3600 + 28*60 + 17;
function riegelPredictSec(targetKm) {
  return ANCHOR_SEC * Math.pow(targetKm / ANCHOR_KM, 1.06);
}
const RACE_PREDICTIONS = [
  { label:"5K",       km:5       },
  { label:"10K",      km:10      },
  { label:"Meia",     km:ANCHOR_KM, isAnchor:true },
  { label:"Maratona", km:42.195  },
].map(p => ({ ...p, sec: p.isAnchor ? ANCHOR_SEC : riegelPredictSec(p.km) }));

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function fmtDuration(sec) {
  if (!sec) return "–";
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  const s = Math.round(sec%60);
  return h>0 ? `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}` : `${m}:${String(s).padStart(2,"0")}`;
}
function paceStr(distance_m, moving_time_s) {
  if (!distance_m || !moving_time_s) return "–:––";
  const secPerKm = moving_time_s / (distance_m / 1000);
  const min = Math.floor(secPerKm / 60);
  const sec = Math.round(secPerKm % 60);
  return `${min}:${sec.toString().padStart(2,"0")}`;
}
function classifyActivity(a) {
  const nameLower = (a.name || "").toLowerCase();
  if (nameLower.includes("meia") || nameLower.includes("maratona") || nameLower.includes("race") || (a.name||"").includes("🏅")) return { label:"Race", color:"#9775FA" };
  if ((a.distance_m || 0) >= 25000) return { label:"Longão", color:"#4DABF7" };
  const hours = (a.moving_time_s || 1) / 3600;
  const rtssPerHour = (a.rtss || 0) / hours;
  if (rtssPerHour > 65) return { label:"Qualidade", color:"#FF3333" };
  if (rtssPerHour > 35) return { label:"Z2", color:"#FCC419" };
  return { label:"Z1", color:"#94D82D" };
}

// Compara o treino real com o que estava planejado no calendário (Fitness Proj)
// pra esse mesmo dia. rTSS real vs planejado captura duração×intensidade num
// número só; tempo na zona alvo mostra se a intensidade certa foi atingida.
function analyzeExecution(activity, plannedWorkouts) {
  if (!activity) return null;
  const dateStr = activity.start_date.slice(0,10);
  const planned = (plannedWorkouts||[]).filter(w => w.date === dateStr);

  const zoneMin = activityZoneMinutes(activity);
  const totalZoneMin = ZONE_DEFS.reduce((s,z) => s + (zoneMin[z.zone]||0), 0);
  const zonePct = {};
  ZONE_DEFS.forEach(z => { zonePct[z.zone] = totalZoneMin > 0 ? (zoneMin[z.zone]/totalZoneMin*100) : 0; });

  if (planned.length === 0) {
    return { hasPlan:false, zoneMin, zonePct, totalZoneMin };
  }

  const planDurationMin = planned.reduce((s,w) => s + (w.durationMin||0), 0);
  const planRtss = planned.reduce((s,w) => s + (w.estRtss||0), 0);
  const targetZone = WORKOUT_KINDS[planned[0].kind]?.zone || null;
  const targetZonePct = targetZone ? zonePct[targetZone] : null;

  const actualRtss = activity.rtss || 0;
  const ratio = planRtss > 0 ? actualRtss / planRtss : null;

  let verdict, verdictColor;
  if (ratio == null) { verdict = "Sem estimativa pra comparar"; verdictColor = "#999"; }
  else if (ratio >= 0.85 && ratio <= 1.15) { verdict = "Bem executado"; verdictColor = "#94D82D"; }
  else if (ratio > 1.15) { verdict = "Mais puxado que o planejado"; verdictColor = "#FF922B"; }
  else if (ratio >= 0.6) { verdict = "Abaixo do planejado"; verdictColor = "#FCC419"; }
  else { verdict = "Muito abaixo do planejado"; verdictColor = "#FF3333"; }

  return {
    hasPlan:true, planDurationMin, planRtss, actualRtss, ratio, targetZone, targetZonePct,
    verdict, verdictColor, zoneMin, zonePct, totalZoneMin,
  };
}

// ─── CUSTOM SVG CHARTS (sem dependência externa) ─────────────────────────────
function MiniLineChart({ data, lines, height=200, refLines=[] }) {
  const width = 700;
  const padding = { top:12, right:10, bottom:22, left:34 };
  const allValues = data.flatMap(d => lines.map(l => d[l.key])).filter(v => v!=null && !isNaN(v));
  const refVals = refLines.map(r => r.y);
  const minV = Math.min(0, ...allValues, ...refVals);
  const maxV = Math.max(1, ...allValues, ...refVals);
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;
  const xStep = data.length > 1 ? innerW / (data.length - 1) : 0;
  const yScale = v => padding.top + innerH - ((v - minV) / (maxV - minV || 1)) * innerH;
  const xScale = i => padding.left + i * xStep;
  const labelEvery = Math.max(1, Math.ceil(data.length / 7));

  function pathFor(key) {
    return data.map((d,i) => `${i===0?"M":"L"} ${xScale(i).toFixed(1)} ${yScale(d[key]).toFixed(1)}`).join(" ");
  }

  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{ width:"100%", height, display:"block" }}>
      {refLines.map((rl,i) => (
        <g key={i}>
          <line x1={padding.left} x2={width-padding.right} y1={yScale(rl.y)} y2={yScale(rl.y)} stroke={rl.color||"#94D82D"} strokeDasharray="4 3" strokeWidth={1} />
          {rl.label && <text x={width-padding.right} y={yScale(rl.y)-4} fontSize="9" fill={rl.color||"#94D82D"} textAnchor="end">{rl.label}</text>}
        </g>
      ))}
      <line x1={padding.left} x2={width-padding.right} y1={yScale(0)} y2={yScale(0)} stroke="#e5e5e5" strokeWidth={1} />
      {lines.map(l => (
        <path key={l.key} d={pathFor(l.key)} fill="none" stroke={l.color} strokeWidth={l.width||2} strokeDasharray={l.dash||""} strokeLinejoin="round" strokeLinecap="round" />
      ))}
      {data.map((d,i) => (i % labelEvery === 0) ? (
        <text key={i} x={xScale(i)} y={height-4} fontSize="9" fill="#bbb" textAnchor="middle">{d.x}</text>
      ) : null)}
    </svg>
  );
}

// Wrapper fino em cima do Chart.js — usado só onde nossos gráficos SVG próprios
// não dão conta (stacked bar, donut). Cria/destrói a instância a cada mudança
// de dados pra não vazar canvas nem duplicar quando o componente re-renderiza.
function ChartCanvas({ type, data, options, height=220 }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const dataKey = JSON.stringify(data);
  const optionsKey = JSON.stringify(options);
  useEffect(() => {
    if (!canvasRef.current) return;
    chartRef.current = new Chart(canvasRef.current, { type, data, options });
    return () => { chartRef.current && chartRef.current.destroy(); };
  }, [type, dataKey, optionsKey]);
  return <canvas ref={canvasRef} height={height}></canvas>;
}

// Compara um recorte de atividades (ex: últimos 7 dias) com o recorte imediatamente
// anterior de mesma duração — usado pros deltas ("▲ 6% vs. semana anterior") do
// kpi-row, tudo calculado a partir de activities real (sync Strava), sem inventar.
function periodStats(activities, daysBack, offsetDays=0) {
  const end = Date.now() - offsetDays*86400000;
  const start = end - daysBack*86400000;
  const inRange = activities.filter(a => { const t = new Date(a.start_date).getTime(); return t > start && t <= end; });
  const volumeKm = inRange.reduce((s,a) => s + (a.distance_m||0), 0) / 1000;
  const zoneMin = { Z1:0, Z2:0, Z3:0, Z4:0, Z5:0 };
  inRange.forEach(a => { const zm = activityZoneMinutes(a); ZONE_DEFS.forEach(z => zoneMin[z.zone] += zm[z.zone]||0); });
  const totalZoneMin = ZONE_DEFS.reduce((s,z) => s+zoneMin[z.zone], 0);
  const z3Pct = totalZoneMin > 0 ? (zoneMin.Z3/totalZoneMin*100) : 0;
  return { count: inRange.length, volumeKm, z3Pct };
}
function deltaLabel(curr, prev, unit="") {
  if (!prev) return null;
  const pct = ((curr-prev)/prev*100);
  const dir = pct >= 0 ? "up" : "down";
  const arrow = pct >= 0 ? "▲" : "▼";
  return { text:`${arrow} ${Math.abs(pct).toFixed(0)}% vs. período anterior`, dir };
}

              {ZONE_DEFS.map(z => (
                <tr key={z.zone}>
                  <td><div style={{ display:"flex", alignItems:"center", gap:8 }}><div style={{ width:10, height:10, borderRadius:"50%", background:z.color }} /><span style={{ fontWeight:700, color:z.color }}>{z.zone}</span></div></td>

      <div className="grid-2">
        <div className="card">
          <div className="card-label">Distribuição de zona por semana</div>
          <div className="page-sub" style={{ marginBottom:10 }}>Tempo em cada zona de FC — últimas {weeks.length} semanas</div>
          {totalMinAll > 0 ? <ChartCanvas type="bar" data={barData} options={barOptions} height={220} /> : <div style={{ fontSize:12, color:"var(--text-muted)" }}>Sem atividades sincronizadas com zona calculada ainda.</div>}
          <div className="zone-legend">
            {ZONE_DEFS.map(z => <span key={z.zone}><i className="dot" style={{ background:z.color }}></i>{z.zone} {z.label}</span>)}
          </div>
        </div>
        <div className="card">
          <div className="card-label">Zonas — total do período</div>
          <div className="page-sub" style={{ marginBottom:10 }}>Minutos acumulados por zona</div>
          {totalMinAll > 0 ? <ChartCanvas type="doughnut" data={donutData} options={donutOptions} height={220} /> : <div style={{ fontSize:12, color:"var(--text-muted)" }}>Sem atividades sincronizadas com zona calculada ainda.</div>}
        </div>
      </div>

}

const DEFAULT_PLAN_FORM = {
  kind:"Easy", note:"",
  durationMin:40, intensityType:"pace", intensityValue:"",
  wuMode:"time", wuValue:10, wuPace:"",
  seriesReps:6, seriesRepTime:"3:00", seriesRestTime:"1:30", seriesIntensityType:"pace", seriesIntensityValue:"",
  cdMode:"time", cdValue:10, cdPace:"",
};

function PageTrainingLog({ pmc, plannedWorkouts, setPlannedWorkouts }) {
  const [openDay, setOpenDay] = useState(null);
  const [form, setForm] = useState(DEFAULT_PLAN_FORM);

  const forecast = computeFitnessForecast(pmc, plannedWorkouts, RACE_DATE);
  const byDate = {};
  plannedWorkouts.forEach(w => { (byDate[w.date] = byDate[w.date] || []).push(w); });

  function openForm(dateStr, existing) {
    if (!existing) {
      setForm(DEFAULT_PLAN_FORM);
    } else if (INTERVAL_KINDS.includes(existing.kind) && existing.series) {
      setForm({
        id:existing.id, kind:existing.kind, note:existing.note||"",
        durationMin:existing.durationMin, intensityType:existing.intensityType||"pace", intensityValue:existing.intensityValue||"",
        wuMode:existing.wu?.mode||"time", wuValue:existing.wu?.value ?? 10, wuPace:existing.wu?.pace||"",
        seriesReps:existing.series?.reps ?? 6,
        seriesRepTime:existing.series?.repTimeSec!=null ? formatMmSs(existing.series.repTimeSec) : "3:00",
        seriesRestTime:existing.series?.restTimeSec!=null ? formatMmSs(existing.series.restTimeSec) : "1:30",
        seriesIntensityType:existing.series?.intensityType||"pace", seriesIntensityValue:existing.series?.intensityValue||"",
        cdMode:existing.cd?.mode||"time", cdValue:existing.cd?.value ?? 10, cdPace:existing.cd?.pace||"",
      });
    } else {
      setForm({ ...DEFAULT_PLAN_FORM, id:existing.id, kind:existing.kind, note:existing.note||"",
        durationMin:existing.durationMin, intensityType:existing.intensityType||"pace", intensityValue:existing.intensityValue||"" });
    }
    setOpenDay(dateStr);
  }

  function saveForm(dateStr) {
    const isInterval = INTERVAL_KINDS.includes(form.kind);
    let fields;
    if (isInterval) {
      fields = {
        kind:form.kind, note:form.note,
        durationMin: Math.round(structuredDurationMin(form) * 10) / 10,
        estRtss: estimateStructuredRtss(form, form.kind),
        intensityType: form.seriesIntensityValue ? form.seriesIntensityType : undefined,
        intensityValue: form.seriesIntensityValue || undefined,
        wu: { mode:form.wuMode, value:form.wuValue, pace:form.wuPace||undefined },
        series: { reps:form.seriesReps, repTimeSec:parseMmSs(form.seriesRepTime), restTimeSec:parseMmSs(form.seriesRestTime),
          intensityType:form.seriesIntensityType, intensityValue:form.seriesIntensityValue||undefined },
        cd: { mode:form.cdMode, value:form.cdValue, pace:form.cdPace||undefined },
      };
    } else {
      fields = {
        kind:form.kind, note:form.note, durationMin:form.durationMin,
        estRtss: estimateRtss(form.durationMin, form.kind),
        intensityType: form.intensityValue ? form.intensityType : undefined,
        intensityValue: form.intensityValue || undefined,
        wu: undefined, series: undefined, cd: undefined,
      };
    }
    if (form.id) {
      setPlannedWorkouts(prev => prev.map(w => w.id===form.id ? { ...w, ...fields } : w));
    } else {
      setPlannedWorkouts(prev => [...prev, { id:`${dateStr}-${Date.now()}`, date:dateStr, ...fields }]);
    }
    setOpenDay(null);
  }

  function deleteWorkout(id) {
    setPlannedWorkouts(prev => prev.filter(w => w.id !== id));
    setOpenDay(null);
  }

  return (
    <div className="page gap-14">
      <div className="tl-head" style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:14, marginBottom:6 }}>
        <div>
          <div className="page-title">Training Log</div>
          <div className="page-sub">Clique em um dia pra registrar ou editar um treino · rTSS estimado a partir do WU/Série/CD</div>
        </div>
        <div className="tl-legend">
          {Object.entries(WORKOUT_KINDS).map(([k,v]) => (
            <span key={k}><i className="dot" style={{ background:v.color, borderRadius:"50%" }}></i>{v.label}</span>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-label">Projeção resultante — hoje até o race day</div>
        <MiniLineChart
          data={forecast}
          lines={[
            { key:"ctl", color:"#2a78d6", width:2.5 },
            { key:"atl", color:"#e34948", width:1.5, dash:"5 3" },
            { key:"tsb", color:"#eda100", width:2.5 },
          ]}
          height={200}
        />
        <div style={{ display:"flex", gap:16, marginTop:8, fontSize:11, color:"var(--text-muted)" }}>
          <span><span style={{color:"#2a78d6"}}>●</span> CTL</span>
          <span><span style={{color:"#e34948"}}>●</span> ATL</span>
          <span><span style={{color:"#eda100"}}>●</span> TSB</span>
        </div>
      </div>

      <div className="card">
        <div className="tl-cal-header">
          <div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div><div>Dom</div>
          <div>Semana</div>
        </div>
        <div className="gap-14">
          {WEEKS.map(w => {
            const { startN, endN } = parseWeekRange(w.dates);
            const dayNs = [];
            for (let n=startN; n<=endN; n++) dayNs.push(n);
            const weekHasOpenDay = dayNs.some(n => ymdFromDayNum(n) === openDay);
            const weekRtss = dayNs.reduce((sum,n) => sum + (byDate[ymdFromDayNum(n)]||[]).reduce((s,wk)=>s+(wk.estRtss||0),0), 0);
            const weekMin = dayNs.reduce((sum,n) => sum + (byDate[ymdFromDayNum(n)]||[]).reduce((s,wk)=>s+(wk.durationMin||0),0), 0);

            return (
              <div key={w.n}>
                <div style={{ fontSize:11, color:"var(--text-muted)", fontWeight:600, marginBottom:6 }}>
                  Semana {w.n} <span style={{ color:"var(--text-muted)", fontWeight:400 }}>· {w.dates}</span>
                  {w.status==="current" && <span style={{ marginLeft:8, color:"var(--accent)", fontWeight:700, textTransform:"uppercase", fontSize:9 }}>Atual</span>}
                  {w.race && <span style={{ marginLeft:8, fontSize:13 }}>🏅</span>}
                </div>
                <div className="tl-week-row">
                  {dayNs.map(n => {
                    const dateStr = ymdFromDayNum(n);
                    const dayWorkouts = byDate[dateStr] || [];
                    const isOpen = openDay === dateStr;
                    return (
                      <div key={dateStr} className={`tl-day ${isOpen?"current":""}`} onClick={() => openForm(dateStr, dayWorkouts[0]||null)}>
                        <div className="tl-day-date">{weekdayPtFromDayNum(n)} {dateStr.slice(8)}</div>
                        {dayWorkouts.map(wk => (
                          <div key={wk.id} className="tl-day-tag" style={{ background:WORKOUT_KINDS[wk.kind]?.color||"#ccc" }}>{WORKOUT_KINDS[wk.kind]?.label||wk.kind}</div>
                        ))}
                        {dayWorkouts.length===0 && <div style={{ fontSize:16, color:"var(--text-muted)" }}>+</div>}
                        {dayWorkouts.length>0 && (
                          <div style={{ fontSize:10.5, color:"var(--text-muted)" }}>
                            {dayWorkouts.reduce((s,wk)=>s+(wk.durationMin||0),0)}min · rTSS {dayWorkouts.reduce((s,wk)=>s+(wk.estRtss||0),0)}
                          </div>
                        )}
                      </div>
                    );
                  })}
                  <div className="tl-week-summary">
                    <div className="k">rTSS total</div><div className="v">{weekRtss}</div>
                    <div className="k" style={{ marginTop:6 }}>Tempo</div><div className="v">{fmtDuration(weekMin*60)}</div>
                  </div>
                </div>

                {weekHasOpenDay && (() => {
                const isInterval = INTERVAL_KINDS.includes(form.kind);
                const estRtssPreview = isInterval ? estimateStructuredRtss(form, form.kind) : estimateRtss(form.durationMin, form.kind);
                return (
                <div style={{ marginTop:10, padding:12, background:"#f8f8f6", borderRadius:8, display:"flex", flexDirection:"column", gap:12 }}>
                  <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"flex-end" }}>
                    <div>
                      <div style={{ fontSize:10, color:"#aaa", marginBottom:3 }}>Tipo</div>
                      <select value={form.kind} onChange={e=>setForm(f=>({ ...f, kind:e.target.value }))} style={{ padding:"5px 8px", borderRadius:6, border:"1px solid #ddd", fontSize:12 }}>
                        {Object.entries(WORKOUT_KINDS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
                      </select>
                    </div>
                    {!isInterval && (
                      <>
                        <div>
                          <div style={{ fontSize:10, color:"#aaa", marginBottom:3 }}>Duração (min)</div>
                          <input type="number" min="0" value={form.durationMin} onChange={e=>setForm(f=>({ ...f, durationMin:parseInt(e.target.value)||0 }))} style={{ width:70, padding:"5px 8px", borderRadius:6, border:"1px solid #ddd", fontSize:12 }} />
                        </div>
                        <div>
                          <div style={{ fontSize:10, color:"#aaa", marginBottom:3 }}>Pace</div>
                          <div style={{ display:"flex", gap:4 }}>
                            <select value={form.intensityType} onChange={e=>setForm(f=>({ ...f, intensityType:e.target.value }))} style={{ padding:"5px 6px", borderRadius:6, border:"1px solid #ddd", fontSize:12 }}>
                              <option value="pace">Pace</option>
                              <option value="power">Potência</option>
                            </select>
                            <input type="text" placeholder={form.intensityType==="pace" ? "5:00/km" : "320W"} value={form.intensityValue} onChange={e=>setForm(f=>({ ...f, intensityValue:e.target.value }))} style={{ width:90, padding:"5px 8px", borderRadius:6, border:"1px solid #ddd", fontSize:12 }} />
                          </div>
                        </div>
                      </>
                    )}
                    <div>
                      <div style={{ fontSize:10, color:"#aaa", marginBottom:3 }}>rTSS estimado</div>
                      <div style={{ padding:"5px 8px", fontFamily:"'DM Mono',monospace", fontSize:14 }}>{estRtssPreview}</div>
                    </div>
                    <div style={{ flex:1, minWidth:120 }}>
                      <div style={{ fontSize:10, color:"#aaa", marginBottom:3 }}>Nota</div>
                      <input type="text" value={form.note} onChange={e=>setForm(f=>({ ...f, note:e.target.value }))} style={{ width:"100%", padding:"5px 8px", borderRadius:6, border:"1px solid #ddd", fontSize:12 }} />
                    </div>
                  </div>

                  {isInterval && (
                    <div style={{ display:"flex", gap:16, flexWrap:"wrap", alignItems:"flex-start", padding:"10px 12px", background:"#fff", borderRadius:8, border:"1px solid #eee" }}>
                      <SegmentFields label="WU" mode={form.wuMode} value={form.wuValue} pace={form.wuPace}
                        onChange={patch => setForm(f=>({ ...f, wuMode:patch.mode??f.wuMode, wuValue:patch.value??f.wuValue, wuPace:patch.pace??f.wuPace }))} />

                      <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                        <div style={{ fontSize:10, color:"#aaa", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em" }}>Série</div>
                        <div style={{ display:"flex", gap:4, alignItems:"center" }}>
                          <input type="number" min="0" placeholder="reps" value={form.seriesReps} onChange={e=>setForm(f=>({ ...f, seriesReps:parseInt(e.target.value)||0 }))} style={{ width:50, padding:"5px 8px", borderRadius:6, border:"1px solid #ddd", fontSize:12 }} />
                          <span style={{ fontSize:11, color:"#bbb" }}>x</span>
                          <input type="text" placeholder="tempo (mm:ss)" value={form.seriesRepTime} onChange={e=>setForm(f=>({ ...f, seriesRepTime:e.target.value }))} style={{ width:80, padding:"5px 8px", borderRadius:6, border:"1px solid #ddd", fontSize:12 }} />
                          <span style={{ fontSize:11, color:"#bbb" }}>desc.</span>
                          <input type="text" placeholder="mm:ss" value={form.seriesRestTime} onChange={e=>setForm(f=>({ ...f, seriesRestTime:e.target.value }))} style={{ width:70, padding:"5px 8px", borderRadius:6, border:"1px solid #ddd", fontSize:12 }} />
                        </div>
                        <div style={{ display:"flex", gap:4 }}>
                          <select value={form.seriesIntensityType} onChange={e=>setForm(f=>({ ...f, seriesIntensityType:e.target.value }))} style={{ padding:"5px 6px", borderRadius:6, border:"1px solid #ddd", fontSize:12 }}>
                            <option value="pace">Pace</option>
                            <option value="power">Potência</option>
                          </select>
                          <input type="text" placeholder={form.seriesIntensityType==="pace" ? "3:30/km" : "395W"} value={form.seriesIntensityValue} onChange={e=>setForm(f=>({ ...f, seriesIntensityValue:e.target.value }))} style={{ width:90, padding:"5px 8px", borderRadius:6, border:"1px solid #ddd", fontSize:12 }} />
                        </div>
                      </div>

                      <SegmentFields label="CD" mode={form.cdMode} value={form.cdValue} pace={form.cdPace}
                        onChange={patch => setForm(f=>({ ...f, cdMode:patch.mode??f.cdMode, cdValue:patch.value??f.cdValue, cdPace:patch.pace??f.cdPace }))} />
                    </div>
                  )}

                  <div style={{ display:"flex", gap:10 }}>
                    <button onClick={() => saveForm(openDay)} style={{ background:"#111", color:"#fff", border:"none", borderRadius:6, padding:"6px 14px", fontSize:12, fontWeight:700, cursor:"pointer" }}>Salvar</button>
                    {form.id && <button onClick={() => deleteWorkout(form.id)} style={{ background:"transparent", color:"#FF3333", border:"1px solid #FF3333", borderRadius:6, padding:"6px 14px", fontSize:12, fontWeight:700, cursor:"pointer" }}>Excluir</button>}
                    <button onClick={() => setOpenDay(null)} style={{ background:"transparent", color:"#888", border:"none", fontSize:12, cursor:"pointer" }}>Cancelar</button>
                  </div>
                </div>
                );
              })()}
            </div>
          );
        })}
      </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const PAGES = [
  { id:"resumo",      label:"Resumo",              component:PageResumo      },
  { id:"frequencia",  label:"Distribuição de FC",  component:PageFrequencia  },
  { id:"predictions", label:"Predictions",         component:PagePredictions },
  { id:"trainingLog", label:"Training Log",        component:PageTrainingLog },
];

function App() {
  const [page, setPage] = useState("resumo");
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [activities, setActivities] = useState([]);
  const [pmc, setPmc] = useState([]);
  const [plannedWorkouts, setPlannedWorkouts] = useState(() => {
    try { return JSON.parse(localStorage.getItem(PLANNED_KEY)) || []; } catch { return []; }
  });
  const [syncing, setSyncing] = useState(false);
  const [syncError, setSyncError] = useState(null);
  const [lastSynced, setLastSynced] = useState(null);

  useEffect(() => {
    localStorage.setItem(PLANNED_KEY, JSON.stringify(plannedWorkouts));
  }, [plannedWorkouts]);

  async function loadData() {
    const { data: acts, error: e1 } = await sb.from("strava_activities").select("*").order("start_date", { ascending: false }).limit(30);
    if (e1) throw e1;
    const { data: pmcData, error: e2 } = await sb.from("daily_pmc").select("*").order("date", { ascending: true });
    if (e2) throw e2;
    setActivities(acts || []);
    setPmc(pmcData || []);
  }

  useEffect(() => {
    loadData().catch(err => setError(String(err.message || err))).finally(() => setLoading(false));
  }, []);

  // Dispara a Edge Function (clever-api/sync-strava) que puxa as atividades novas
  // do Strava e recalcula PMC/zonas, depois recarrega os dados do Supabase.
  async function handleSync() {
    setSyncing(true);
    setSyncError(null);
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/clever-api`, {
        method: "POST",
        headers: { Authorization: `Bearer ${SUPABASE_ANON_KEY}`, "Content-Type": "application/json" },
      });
      const result = await res.json();
      if (!res.ok || result.ok === false) throw new Error(result.error || `HTTP ${res.status}`);
      await loadData();
      setLastSynced(new Date());
    } catch (err) {
      setSyncError(String(err.message || err));
    } finally {
      setSyncing(false);
    }
  }

  const daysOut = Math.ceil((RACE_DATE - new Date()) / 86400000);
  const latestPmc = pmc.length > 0 ? pmc[pmc.length - 1] : { ctl:0, atl:0, tsb:0 };

  if (loading) {
    return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", color:"var(--text-muted)" }}>Carregando dados do Supabase...</div>;
  }
  if (error) {
    return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", color:"#e34948", padding:20, textAlign:"center" }}>Erro ao carregar dados: {error}</div>;
  }

  const pageInfo = PAGES.find(p => p.id === page) || PAGES[0];
  const Current = pageInfo.component;
  const pageProps = page === "resumo"      ? { activities, latestPmc, daysOut, plannedWorkouts }
                   : page === "frequencia" ? { activities }
                   : page === "predictions"? { pmc, latestPmc }
                   : page === "trainingLog"? { pmc, plannedWorkouts, setPlannedWorkouts }
                   : {};

  return (
    <div className="wrap">
      <header className="top">
        <div className="title-block">
          <div className="eyebrow">GPS → Chicago Marathon · 11 de outubro</div>
          <h1>Performance Dashboard</h1>
          <div className="race-days"><b>{daysOut}</b> dias · <b>{Math.ceil(daysOut/7)}</b> semanas para o race day</div>
        </div>
        <div className="sync-wrap">
          <button className="sync-btn" onClick={handleSync} disabled={syncing}>
            {syncing ? "Sincronizando…" : "⟳ Atualizar treinos"}
          </button>
          {syncError ? (
            <div className="last-sync" style={{ color:"#e34948" }}>Erro ao sincronizar: {syncError}</div>
          ) : lastSynced ? (
            <div className="last-sync">Sincronizado às {lastSynced.toLocaleTimeString("pt-BR", { hour:"2-digit", minute:"2-digit" })}</div>
          ) : null}
        </div>
      </header>

      <nav className="tab-nav">
        {PAGES.map(p => (
          <button key={p.id} className={`tab-btn ${page===p.id?"active":""}`} onClick={() => setPage(p.id)}>{p.label}</button>
        ))}
      </nav>

      <Current {...pageProps} />

      <div className="footer-note">Dados reais sincronizados do Strava via Supabase · treinos planejados salvos neste navegador (localStorage)</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
