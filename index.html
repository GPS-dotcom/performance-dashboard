function classifyActivity(a) {
  const nameLower = (a.name || "").toLowerCase();
  if (nameLower.includes("meia") || nameLower.includes("maratona") || nameLower.includes("race") || (a.name||"").includes("🏅")) return "Race";
  if ((a.distance_m || 0) >= 25000) return "Long";
  const hours = (a.moving_time_s || 1) / 3600;
  const rtssPerHour = (a.rtss || 0) / hours;
  if (rtssPerHour > 65) return "Quality";
  if (rtssPerHour > 35) return "Z2";
  return "Z1";
}

function paceStr(distance_m, moving_time_s) {
  if (!distance_m || !moving_time_s) return "–:––";
  const secPerKm = moving_time_s / (distance_m / 1000);
  const min = Math.floor(secPerKm / 60);
  const sec = Math.round(secPerKm % 60);
  return `${min}:${sec.toString().padStart(2,"0")}`;
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const C = { bg:"#0A0A0F", surface:"#0D0D1A", border:"#1E1E2E", text:"#E8E8F0", muted:"#6B6B8A", accent:"#4CC9F0" };
function Card({ children, style={} }) {
  return <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:16, ...style }}>{children}</div>;
}
function Label({ children, color }) {
  return <div style={{ fontSize:10, letterSpacing:"0.12em", textTransform:"uppercase", color:color||C.muted, marginBottom:6 }}>{children}</div>;
}
function StatBox({ label, value, sub, color="#4CC9F0" }) {
  return (
    <div style={{ textAlign:"center" }}>
      <div style={{ fontSize:22, fontWeight:800, color, letterSpacing:"-0.03em" }}>{value}</div>
      {sub && <div style={{ fontSize:10, color:C.muted, marginTop:1 }}>{sub}</div>}
      <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>{label}</div>
    </div>
  );
}

            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, textAlign:"center" }}>
              <div><div style={{ color:"#E8A838", fontWeight:700 }}>178bpm</div><div style={{ fontSize:10, color:C.muted }}>FC LT2</div></div>
              <div><div style={{ color:"#4CC9F0", fontWeight:700 }}>393W</div><div style={{ fontSize:10, color:C.muted }}>Potência LT2</div></div>
              <div><div style={{ color:"#9B5DE5", fontWeight:700 }}>VDOT 58</div><div style={{ fontSize:10, color:C.muted }}>índice atual</div></div>
            </div>
          </Card>
          {PACES.map(p=>(
            <div key={p.zone} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"10px 12px" }}>
              <div style={{ fontSize:12, fontWeight:600, marginBottom:6 }}>{p.zone}</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, fontSize:11 }}>
                <div><div style={{ color:"#4CC9F0", fontWeight:700 }}>{p.pace}</div><div style={{ color:C.muted }}>pace</div></div>
                <div><div style={{ color:"#E63946", fontWeight:700 }}>{p.bpm}</div><div style={{ color:C.muted }}>FC</div></div>
                <div><div style={{ color:"#E8A838", fontWeight:700 }}>{p.watts}</div><div style={{ color:C.muted }}>potência</div></div>
              </div>
              <div style={{ fontSize:10, color:C.muted, marginTop:6, borderTop:`1px solid ${C.border}`, paddingTop:5 }}>{p.use}</div>
            </div>
          ))}
          <Card style={{ background:"#100A17", border:"1px solid #2A1A3A" }}>
            <Label color="#9B5DE5">Recalibração LT2</Label>
            <div style={{ fontSize:12, color:"#B0A0C0" }}>Estimativa atual aponta para ~3:50/km em esforço fresco de 30min. Field test agendado para semana 6 do Build (Ago 5).</div>
          </Card>
        </div>
      )}

      {/* ── TAB: LIBRARY ── */}
      {tab === "library" && (
        <div style={{ display:"flex", flexDirection:"column" }}>
          <div style={{ display:"flex", overflowX:"auto", background:C.surface, borderBottom:`1px solid ${C.border}` }}>
            {Object.entries(LIBRARY).map(([k,cat])=>(
              <button key={k} onClick={()=>{ setLibCat(k); setLibOpen(null); setLibFilter(0); }} style={{
                background: libCat===k ? cat.color+"11" : "transparent", border:"none",
                borderBottom: libCat===k ? `2px solid ${cat.color}` : "2px solid transparent",
                color: libCat===k ? cat.color : C.muted,
                padding:"9px 12px", fontSize:11, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap",
              }}>
                <span style={{ background:libCat===k ? cat.color+"33" : "#1E1E2E", color:libCat===k ? cat.color : C.muted, borderRadius:4, padding:"1px 5px", fontSize:9, marginRight:5 }}>{k}</span>
                {cat.label}
              </button>
            ))}
          </div>
          {(()=>{
            const cat = LIBRARY[libCat];
            return (
              <>
                <div style={{ background:cat.color+"08", borderBottom:`1px solid ${cat.color}22`, padding:"10px 14px" }}>
                  <div style={{ fontSize:10, color:cat.color, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:3 }}>{cat.zone}</div>
                  <div style={{ fontSize:12, color:"#B8B8CC" }}>{cat.desc}</div>
                </div>
                <div style={{ padding:"8px 12px", display:"flex", gap:6, alignItems:"center", borderBottom:`1px solid ${C.border}`, background:C.surface }}>
                  <span style={{ fontSize:10, color:C.muted }}>DIFICULDADE:</span>
                  {[0,1,2,3,4,5].map(d=>(
                    <button key={d} onClick={()=>setLibFilter(d)} style={{
                      background:libFilter===d?(d===0?"#1E1E2E":DIFF_DOT[d]+"33"):"transparent",
                      border:`1px solid ${libFilter===d?(d===0?"#3E3E5E":DIFF_DOT[d]):"#1E1E2E"}`,
                      color:d===0?"#B8B8CC":DIFF_DOT[d], borderRadius:20,
                      padding:"2px 7px", fontSize:10, fontWeight:600, cursor:"pointer",
                    }}>{d===0?"Todos":["","Leve","Mod","Intenso","Muito","Máx"][d]}</button>
                  ))}
                </div>
                <div style={{ padding:"8px 12px 40px" }}>
                  {cat.items.filter(w=>libFilter===0||w.diff===libFilter).map(w=>{
                    const isOpen = libOpen===w.tag;
                    return (
                      <div key={w.tag} style={{
                        background:isOpen ? cat.color+"08" : C.surface,
                        border:`1px solid ${isOpen ? cat.color+"44" : C.border}`,
                        borderRadius:8, marginBottom:8, overflow:"hidden",
                      }}>
                        <button onClick={()=>setLibOpen(isOpen?null:w.tag)} style={{
                          width:"100%", background:"transparent", border:"none", padding:"11px 12px",
                          display:"flex", alignItems:"center", gap:10, cursor:"pointer", textAlign:"left",
                        }}>
                          <span style={{ background:cat.color+"22", color:cat.color, borderRadius:4, padding:"2px 6px", fontSize:10, fontWeight:700, fontFamily:"monospace", border:`1px solid ${cat.color}33`, flexShrink:0 }}>{w.tag}</span>
                          <div style={{ flex:1 }}>
                            <div style={{ fontSize:12, fontWeight:600, color:C.text }}>{w.name}</div>
                            <div style={{ fontSize:10, color:C.muted, marginTop:1 }}>{w.when}</div>
                          </div>
                          <div style={{ display:"flex", gap:2, flexShrink:0 }}>
                            {[1,2,3,4,5].map(i=><div key={i} style={{ width:5,height:5,borderRadius:"50%",background:i<=w.diff?DIFF_DOT[w.diff]:"#1E1E2E" }}/>)}
                          </div>
                          <span style={{ color:cat.color, fontSize:13, transform:isOpen?"rotate(180deg)":"none", transition:"transform 0.2s", marginLeft:4 }}>▾</span>
                        </button>
                        {isOpen && (
                          <div style={{ padding:"0 12px 12px" }}>
                            <div style={{ height:1, background:cat.color+"22", marginBottom:10 }} />
                            <div style={{ marginBottom:10 }}>
                              <div style={{ fontSize:10, color:C.muted, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:7 }}>Estrutura</div>
                              {w.steps.map((s,i)=>(
                                <div key={i} style={{ display:"flex", gap:8, marginBottom:4 }}>
                                  <div style={{ width:17,height:17,borderRadius:"50%",background:cat.color+"22",border:`1px solid ${cat.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:cat.color,fontWeight:700,flexShrink:0,marginTop:1 }}>{i+1}</div>
                                  <div style={{ fontSize:12, color:"#B8B8CC", lineHeight:1.5 }}>{s}</div>
                                </div>
                              ))}
                            </div>
                            <div style={{ background:cat.color+"0D", borderLeft:`3px solid ${cat.color}`, borderRadius:"0 6px 6px 0", padding:"7px 10px", marginBottom:7 }}>
                              <div style={{ fontSize:9, color:cat.color+"99", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:2 }}>Foco</div>
                              <div style={{ fontSize:12, color:"#D0D0E8" }}>{w.focus}</div>
                            </div>
                            <div style={{ background:"#1A1A2E", borderRadius:6, padding:"7px 10px" }}>
                              <div style={{ fontSize:9, color:C.muted, marginBottom:2 }}>💡 Execução</div>
                              <div style={{ fontSize:11, color:"#9090A8", lineHeight:1.5 }}>{w.tip}</div>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </>
            );
          })()}
        </div>
      )}

      {/* ── FOOTER ── */}
      <div style={{ borderTop:`1px solid ${C.border}`, padding:"10px 16px", background:C.surface, fontSize:10, color:"#3A3A5A", textAlign:"center" }}>
        GPS · Chicago 2026 · LT2 3:58/km · I-pace 3:25–3:35 · R-pace 3:00–3:10 · Dados ao vivo via Supabase
      </div>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<ChicagoDashboard />);
</script>
</body>
</html>
