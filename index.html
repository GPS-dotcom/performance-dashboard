function parsePaceMin(str) {
  const m = String(str).match(/(\d+):(\d{1,2})/);
  return m ? parseInt(m[1],10) + parseInt(m[2],10)/60 : null;
}
function parsePowerW(str) {
  const m = String(str).match(/(\d+(?:\.\d+)?)/);
  return m ? parseFloat(m[1]) : null;
}
function findZone(predicate) {
  return (ZONE_DEFS.find(predicate) || ZONE_DEFS[ZONE_DEFS.length-1]).zone;
}
function classifyIntensity(type, value) {
  if (!value) return null;
  if (type === "power") {
    const w = parsePowerW(value);
    return w == null ? null : findZone(z => w <= z.pwMax);
  }
  if (type === "pace") {
    const p = parsePaceMin(value);
    return p == null ? null : findZone(z => p >= z.paceFast);
  }
  return null;
}
function classifyActivityZone(a) {
  const watts = a.weighted_average_watts || a.average_watts;
  if (watts) return findZone(z => watts <= z.pwMax);
  if (a.average_heartrate) return findZone(z => a.average_heartrate <= z.hrMax);
  return null;
}

// Tempo real por zona vem de a.zone_minutes, calculado a partir dos streams

// mascaramento de média que treinos intervalados sofrem). Enquanto uma
// atividade ainda não tiver passado pelo backfill, cai de volta pra uma
// zona única estimada pela potência/FC média do treino inteiro.
function activityZoneMinutes(a) {
  const real = a.zone_minutes;
  if (real && Object.values(real).some(v => v > 0)) return real;
  const zone = classifyActivityZone(a);
  const out = { Z1:0, Z2:0, Z3:0, Z4:0, Z5:0 };
  if (zone) out[zone] = (a.moving_time_s||0)/60;
  return out;
}

function estimateRtss(durationMin, kind) {
  const iF = WORKOUT_KINDS[kind]?.if ?? 0;
  return Math.round((durationMin/60) * iF*iF * 100);
}

function parseMmSs(str) {
  const m = String(str).match(/(\d+):(\d{1,2})/);
  if (m) return parseInt(m[1],10)*60 + parseInt(m[2],10);
  const n = parseFloat(str);
  return isNaN(n) ? 0 : Math.round(n*60);
}
function formatMmSs(totalSec) {
  const s = Math.round(totalSec||0);
  const m = Math.floor(s/60), sec = s%60;
  return `${m}:${String(sec).padStart(2,"0")}`;
}
function segmentDurationMin(seg) {
  if (!seg) return 0;
  if (seg.mode === "distance") {
    const paceMin = parsePaceMin(seg.pace);
    return (paceMin && seg.value) ? paceMin * seg.value : 0;
  }
  return seg.value || 0;
}
const EASY_IF = 0.7, REST_IF = 0.55;
function structuredDurationMin(f) {
  const wuMin = segmentDurationMin({ mode:f.wuMode, value:f.wuValue, pace:f.wuPace });
  const cdMin = segmentDurationMin({ mode:f.cdMode, value:f.cdValue, pace:f.cdPace });
  const seriesMin = (f.seriesReps||0) * (parseMmSs(f.seriesRepTime) + parseMmSs(f.seriesRestTime)) / 60;
  return wuMin + seriesMin + cdMin;
}
function estimateStructuredRtss(f, kind) {
  const wuMin = segmentDurationMin({ mode:f.wuMode, value:f.wuValue, pace:f.wuPace });
  const cdMin = segmentDurationMin({ mode:f.cdMode, value:f.cdValue, pace:f.cdPace });
  const repMin = (f.seriesReps||0) * parseMmSs(f.seriesRepTime) / 60;
  const restMin = (f.seriesReps||0) * parseMmSs(f.seriesRestTime) / 60;
  const seriesIF = WORKOUT_KINDS[kind]?.if ?? 0.9;
  const tss = (wuMin/60)*EASY_IF*EASY_IF*100
            + (repMin/60)*seriesIF*seriesIF*100
            + (restMin/60)*REST_IF*REST_IF*100
            + (cdMin/60)*EASY_IF*EASY_IF*100;
  return Math.round(tss);
}

// Datas representadas como "day number" (dias desde a epoch, via Date.UTC) para
// nunca depender do fuso horário do navegador — evita deslocar o race day.
const WEEK_MONTHS = { Jun:5, Jul:6, Ago:7, Set:8, Out:9 };
function dayNum(y, m, d) { return Math.floor(Date.UTC(y, m, d) / 86400000); }
function dayNumFromYMD(ymd) { const [y,m,d] = ymd.split("-").map(Number); return dayNum(y, m-1, d); }
function ymdFromDayNum(n) {
  const dt = new Date(n * 86400000);
  const y = dt.getUTCFullYear(), m = String(dt.getUTCMonth()+1).padStart(2,"0"), d = String(dt.getUTCDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
const WEEKDAY_PT = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
function weekdayPtFromDayNum(n) { return WEEKDAY_PT[new Date(n * 86400000).getUTCDay()]; }

function parseWeekRange(str, year=2026) {
  const [l, r] = str.split("–");
  const [lm, ld] = l.trim().split(" ");
  const startN = dayNum(year, WEEK_MONTHS[lm], parseInt(ld,10));
  const rParts = r.trim().split(" ");
  const endN = rParts.length === 2
    ? dayNum(year, WEEK_MONTHS[rParts[0]], parseInt(rParts[1],10))
    : dayNum(year, WEEK_MONTHS[lm], parseInt(rParts[0],10));
  return { startN, endN };
}

function computeFitnessForecast(pmc, plannedWorkouts, raceDate) {
  const last = pmc.length ? pmc[pmc.length-1] : null;
  let ctl = last?.ctl ?? 0, atl = last?.atl ?? 0;
  const today = new Date();
  const startN = last ? dayNumFromYMD(last.date) + 1 : dayNum(today.getFullYear(), today.getMonth(), today.getDate());
  const raceN = dayNum(raceDate.getUTCFullYear(), raceDate.getUTCMonth(), raceDate.getUTCDate());
  const byDate = {};
  plannedWorkouts.forEach(w => { byDate[w.date] = (byDate[w.date]||0) + (w.estRtss||0); });

  const out = [];
  for (let n = startN; n <= raceN; n++) {
    const tsb = ctl - atl;
    const dateStr = ymdFromDayNum(n);
    const tss = byDate[dateStr] || 0;
    ctl += (tss - ctl) / 42;
    atl += (tss - atl) / 7;
    out.push({ x: dateStr.slice(5), date: dateStr, ctl, atl, tsb });
  }
  return out;
}

function fmtDuration(sec) {
  if (!sec) return "–";
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  const s = Math.round(sec%60);
  return h>0 ? `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}` : `${m}:${String(s).padStart(2,"0")}`;
}
function paceStr(distance_m, moving_time_s) {
  if (!distance_m || !moving_time_s) return "–:––";
  const secPerKm = moving_time_s / (distance_m / 1000);
  const min = Math.floor(secPerKm / 60);
  const sec = Math.round(secPerKm % 60);
  return `${min}:${sec.toString().padStart(2,"0")}`;
}
function classifyActivity(a) {
  const nameLower = (a.name || "").toLowerCase();
  if (nameLower.includes("meia") || nameLower.includes("maratona") || nameLower.includes("race") || (a.name||"").includes("🏅")) return { label:"Race", color:"#9775FA" };
  if ((a.distance_m || 0) >= 25000) return { label:"Longão", color:"#4DABF7" };
  const hours = (a.moving_time_s || 1) / 3600;
  const rtssPerHour = (a.rtss || 0) / hours;
  if (rtssPerHour > 65) return { label:"Qualidade", color:"#FF3333" };
  if (rtssPerHour > 35) return { label:"Z2", color:"#FCC419" };
  return { label:"Z1", color:"#94D82D" };
}

// Compara o treino real com o que estava planejado no calendário (Fitness Proj)
// pra esse mesmo dia. rTSS real vs planejado captura duração×intensidade num
// número só; tempo na zona alvo mostra se a intensidade certa foi atingida.
function analyzeExecution(activity, plannedWorkouts) {
  if (!activity) return null;
  const dateStr = activity.start_date.slice(0,10);
  const planned = (plannedWorkouts||[]).filter(w => w.date === dateStr);

  const zoneMin = activityZoneMinutes(activity);
  const totalZoneMin = ZONE_DEFS.reduce((s,z) => s + (zoneMin[z.zone]||0), 0);
  const zonePct = {};
  ZONE_DEFS.forEach(z => { zonePct[z.zone] = totalZoneMin > 0 ? (zoneMin[z.zone]/totalZoneMin*100) : 0; });

  if (planned.length === 0) {
    return { hasPlan:false, zoneMin, zonePct, totalZoneMin };
  }

  const planDurationMin = planned.reduce((s,w) => s + (w.durationMin||0), 0);
  const planRtss = planned.reduce((s,w) => s + (w.estRtss||0), 0);
  const targetZone = WORKOUT_KINDS[planned[0].kind]?.zone || null;
  const targetZonePct = targetZone ? zonePct[targetZone] : null;

  const actualRtss = activity.rtss || 0;
  const ratio = planRtss > 0 ? actualRtss / planRtss : null;

  let verdict, verdictColor;
  if (ratio == null) { verdict = "Sem estimativa pra comparar"; verdictColor = "#999"; }
  else if (ratio >= 0.85 && ratio <= 1.15) { verdict = "Bem executado"; verdictColor = "#94D82D"; }
  else if (ratio > 1.15) { verdict = "Mais puxado que o planejado"; verdictColor = "#FF922B"; }
  else if (ratio >= 0.6) { verdict = "Abaixo do planejado"; verdictColor = "#FCC419"; }
  else { verdict = "Muito abaixo do planejado"; verdictColor = "#FF3333"; }

  return {
    hasPlan:true, planDurationMin, planRtss, actualRtss, ratio, targetZone, targetZonePct,
    verdict, verdictColor, zoneMin, zonePct, totalZoneMin,
  };
}

function MiniLineChart({ data, lines, height=200, refLines=[] }) {
  const width = 700;
  const padding = { top:12, right:10, bottom:22, left:34 };
  const allValues = data.flatMap(d => lines.map(l => d[l.key])).filter(v => v!=null && !isNaN(v));
  const refVals = refLines.map(r => r.y);
  const minV = Math.min(0, ...allValues, ...refVals);
  const maxV = Math.max(1, ...allValues, ...refVals);
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;
  const xStep = data.length > 1 ? innerW / (data.length - 1) : 0;
  const yScale = v => padding.top + innerH - ((v - minV) / (maxV - minV || 1)) * innerH;
  const xScale = i => padding.left + i * xStep;
  const labelEvery = Math.max(1, Math.ceil(data.length / 7));

  function pathFor(key) {
    return data.map((d,i) => `${i===0?"M":"L"} ${xScale(i).toFixed(1)} ${yScale(d[key]).toFixed(1)}`).join(" ");
  }

  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{ width:"100%", height, display:"block" }}>
      {refLines.map((rl,i) => (
        <g key={i}>
          <line x1={padding.left} x2={width-padding.right} y1={yScale(rl.y)} y2={yScale(rl.y)} stroke={rl.color||"#94D82D"} strokeDasharray="4 3" strokeWidth={1} />
          {rl.label && <text x={width-padding.right} y={yScale(rl.y)-4} fontSize="9" fill={rl.color||"#94D82D"} textAnchor="end">{rl.label}</text>}
        </g>
      ))}
      <line x1={padding.left} x2={width-padding.right} y1={yScale(0)} y2={yScale(0)} stroke="#e5e5e5" strokeWidth={1} />
      {lines.map(l => (
        <path key={l.key} d={pathFor(l.key)} fill="none" stroke={l.color} strokeWidth={l.width||2} strokeDasharray={l.dash||""} strokeLinejoin="round" strokeLinecap="round" />
      ))}
      {data.map((d,i) => (i % labelEvery === 0) ? (
        <text key={i} x={xScale(i)} y={height-4} fontSize="9" fill="#bbb" textAnchor="middle">{d.x}</text>
      ) : null)}
    </svg>
  );
}

function MiniBarChart({ data, valueKey, colorFor, height=140, refLines=[] }) {
  const width = 700;
  const padding = { top:10, right:10, bottom:20, left:34 };
  const maxV = Math.max(1, ...data.map(d=>d[valueKey]), ...refLines.map(r=>r.y));
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;
  const gap = innerW / data.length;
  const barW = gap * 0.65;
  const yScale = v => padding.top + innerH - (v/maxV) * innerH;

  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{ width:"100%", height, display:"block" }}>
      {refLines.map((rl,i) => (
        <line key={i} x1={padding.left} x2={width-padding.right} y1={yScale(rl.y)} y2={yScale(rl.y)} stroke={rl.color||"#ccc"} strokeDasharray="3 3" strokeWidth={1} />
      ))}
      {data.map((d,i) => {
        const x = padding.left + i*gap + (gap-barW)/2;
        const y = yScale(d[valueKey]);
        return <rect key={i} x={x} y={y} width={barW} height={(padding.top+innerH)-y} fill={colorFor(d)} rx={3} />;
      })}
    </svg>
  );
}

function PageZones({ plannedWorkouts, activities }) {
  const byDate = {};
  plannedWorkouts.forEach(w => { (byDate[w.date] = byDate[w.date] || []).push(w); });

  function zoneBreakdown(zoneMinObjects) {
    const zoneMin = { Z1:0, Z2:0, Z3:0, Z4:0, Z5:0 };
    zoneMinObjects.forEach(zm => {
      ZONE_DEFS.forEach(z => { zoneMin[z.zone] += zm[z.zone] || 0; });
    });
    const totalMin = ZONE_DEFS.reduce((s,z) => s + zoneMin[z.zone], 0);
    const pct = {};
    ZONE_DEFS.forEach(z => { pct[z.zone] = totalMin > 0 ? (zoneMin[z.zone]/totalMin*100) : 0; });
    return { totalMin, pct };
  }

  const weekZoneData = WEEKS.map(w => {
    const { startN, endN } = parseWeekRange(w.dates);
    const startStr = ymdFromDayNum(startN), endStr = ymdFromDayNum(endN);

    const real = zoneBreakdown(
      activities
        .filter(a => { const d = a.start_date.slice(0,10); return d >= startStr && d <= endStr; })
        .map(a => activityZoneMinutes(a))
    );

    const plannedEntries = [];
    for (let n=startN; n<=endN; n++) {
      (byDate[ymdFromDayNum(n)] || []).forEach(wk => {
        const zone = classifyIntensity(wk.intensityType, wk.intensityValue) || WORKOUT_KINDS[wk.kind]?.zone;
        if (!zone || !wk.durationMin) return;
        plannedEntries.push({ [zone]: wk.durationMin });
      });
    }
    const planned = zoneBreakdown(plannedEntries);

    return { week:w, real, planned };
  });

  return (
    <div className="page gap-14">
      <div>
        <div className="page-title">Zonas de Treino</div>
        <div className="page-sub">Calculadas a partir do LT2: 393W · 178bpm · 3:58/km</div>
      </div>
      <div className="card">
        <div className="card-label">Definição das Zonas</div>
        <div style={{ overflowX:"auto" }}>
          <table className="lap-table">
            <thead><tr><th>Zona</th><th>Nome</th><th>Potência</th><th>FC</th><th>Pace</th><th>% FTP</th></tr></thead>
            <tbody>
              {ZONE_DEFS.map(z => (
                <tr key={z.zone}>
                  <td><div style={{ display:"flex", alignItems:"center", gap:8 }}><div style={{ width:10, height:10, borderRadius:"50%", background:z.color }} /><span style={{ fontWeight:700, color:z.color }}>{z.zone}</span></div></td>
                  <td style={{ color:"#555" }}>{z.label}</td>
                  <td style={{ fontFamily:"'DM Mono',monospace", fontSize:12 }}>{z.pw}</td>
                  <td style={{ fontFamily:"'DM Mono',monospace", fontSize:12 }}>{z.hr}</td>
                  <td style={{ fontFamily:"'DM Mono',monospace", fontSize:12 }}>{z.pace}</td>
                  <td style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:"#888" }}>{z.pct}%</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="card">
        <div className="card-label">% de Tempo por Zona · por Semana</div>
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          {weekZoneData.map(({ week, real, planned }) => (
            <div key={week.n} style={{ paddingBottom:12, borderBottom:"1px solid #f5f5f5" }}>
              <div style={{ fontSize:11, color:"#666", fontWeight:700, marginBottom:6 }}>
                Sem {week.n} <span style={{ color:"#bbb", fontWeight:400 }}>· {week.dates}</span>
                {week.status==="current" && <span style={{ marginLeft:8, background:"#E8FF00", color:"#111", fontSize:9, fontWeight:800, padding:"1px 7px", borderRadius:20, textTransform:"uppercase" }}>Atual</span>}
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                <ZoneTimeRow label="Real" totalMin={real.totalMin} pct={real.pct} empty="sem atividades sincronizadas" />
                <ZoneTimeRow label="Planejado" totalMin={planned.totalMin} pct={planned.pct} empty="sem treinos cadastrados" />
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const DEFAULT_PLAN_FORM = {
  kind:"Easy", note:"",
  durationMin:40, intensityType:"pace", intensityValue:"",
  wuMode:"time", wuValue:10, wuPace:"",
  seriesReps:6, seriesRepTime:"3:00", seriesRestTime:"1:30", seriesIntensityType:"pace", seriesIntensityValue:"",
  cdMode:"time", cdValue:10, cdPace:"",
};

function PagePlan({ pmc, plannedWorkouts, setPlannedWorkouts }) {
  const [openDay, setOpenDay] = useState(null);
  const [form, setForm] = useState(DEFAULT_PLAN_FORM);

  const forecast = computeFitnessForecast(pmc, plannedWorkouts, RACE_DATE);
  const byDate = {};
  plannedWorkouts.forEach(w => { (byDate[w.date] = byDate[w.date] || []).push(w); });

  function openForm(dateStr, existing) {
    if (!existing) {
      setForm(DEFAULT_PLAN_FORM);
    } else if (INTERVAL_KINDS.includes(existing.kind) && existing.series) {
      setForm({
        id:existing.id, kind:existing.kind, note:existing.note||"",
        durationMin:existing.durationMin, intensityType:existing.intensityType||"pace", intensityValue:existing.intensityValue||"",
        wuMode:existing.wu?.mode||"time", wuValue:existing.wu?.value ?? 10, wuPace:existing.wu?.pace||"",
        seriesReps:existing.series?.reps ?? 6,
        seriesRepTime:existing.series?.repTimeSec!=null ? formatMmSs(existing.series.repTimeSec) : "3:00",
        seriesRestTime:existing.series?.restTimeSec!=null ? formatMmSs(existing.series.restTimeSec) : "1:30",
        seriesIntensityType:existing.series?.intensityType||"pace", seriesIntensityValue:existing.series?.intensityValue||"",
        cdMode:existing.cd?.mode||"time", cdValue:existing.cd?.value ?? 10, cdPace:existing.cd?.pace||"",
      });
    } else {
      setForm({ ...DEFAULT_PLAN_FORM, id:existing.id, kind:existing.kind, note:existing.note||"",
        durationMin:existing.durationMin, intensityType:existing.intensityType||"pace", intensityValue:existing.intensityValue||"" });
    }
    setOpenDay(dateStr);
  }

  function saveForm(dateStr) {
    const isInterval = INTERVAL_KINDS.includes(form.kind);
    let fields;
    if (isInterval) {
      fields = {
        kind:form.kind, note:form.note,
        durationMin: Math.round(structuredDurationMin(form) * 10) / 10,
        estRtss: estimateStructuredRtss(form, form.kind),
        intensityType: form.seriesIntensityValue ? form.seriesIntensityType : undefined,
        intensityValue: form.seriesIntensityValue || undefined,
        wu: { mode:form.wuMode, value:form.wuValue, pace:form.wuPace||undefined },
        series: { reps:form.seriesReps, repTimeSec:parseMmSs(form.seriesRepTime), restTimeSec:parseMmSs(form.seriesRestTime),
          intensityType:form.seriesIntensityType, intensityValue:form.seriesIntensityValue||undefined },
        cd: { mode:form.cdMode, value:form.cdValue, pace:form.cdPace||undefined },
      };
    } else {
      fields = {
        kind:form.kind, note:form.note, durationMin:form.durationMin,
        estRtss: estimateRtss(form.durationMin, form.kind),
        intensityType: form.intensityValue ? form.intensityType : undefined,
        intensityValue: form.intensityValue || undefined,
        wu: undefined, series: undefined, cd: undefined,
      };
    }
    if (form.id) {
      setPlannedWorkouts(prev => prev.map(w => w.id===form.id ? { ...w, ...fields } : w));
    } else {
      setPlannedWorkouts(prev => [...prev, { id:`${dateStr}-${Date.now()}`, date:dateStr, ...fields }]);
    }
    setOpenDay(null);
  }

  function deleteWorkout(id) {
    setPlannedWorkouts(prev => prev.filter(w => w.id !== id));
    setOpenDay(null);
  }

  return (
    <div className="page gap-14">
      <div>
        <div className="page-title">Fitness Proj</div>
        <div className="page-sub">Calendário de treinos planejados · a previsão de CTL/ATL/TSB abaixo é a mesma exibida na aba Fitness</div>
      </div>

      <div className="card">
        <div className="card-label">Projeção resultante — hoje até o race day</div>
        <MiniLineChart
          data={forecast}
          lines={[
            { key:"ctl", color:"#4DABF7", width:2.5 },
            { key:"atl", color:"#FF3333", width:1.5, dash:"5 3" },
            { key:"tsb", color:"#FCC419", width:2.5 },
          ]}
          height={200}
        />
        <div style={{ display:"flex", gap:16, marginTop:8, fontSize:11, color:"#888" }}>
          <span><span style={{color:"#4DABF7"}}>●</span> CTL</span>
          <span><span style={{color:"#FF3333"}}>●</span> ATL</span>
          <span><span style={{color:"#FCC419"}}>●</span> TSB</span>
        </div>
      </div>

      <div className="gap-14">
        {WEEKS.map(w => {
          const { startN, endN } = parseWeekRange(w.dates);
          const dayNs = [];
          for (let n=startN; n<=endN; n++) dayNs.push(n);
          const weekHasOpenDay = dayNs.some(n => ymdFromDayNum(n) === openDay);
          const weekRtss = dayNs.reduce((sum,n) => sum + (byDate[ymdFromDayNum(n)]||[]).reduce((s,wk)=>s+(wk.estRtss||0),0), 0);

          return (
            <div key={w.n} className={`week-card ${w.status==="current"?"current":""}`} style={{ borderLeftColor: PHASE_COLORS[w.phase]||"#ddd" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10, flexWrap:"wrap", gap:8 }}>
                <div>
                  <span style={{ fontSize:10, fontWeight:700, color: PHASE_COLORS[w.phase]||"#888", textTransform:"uppercase", letterSpacing:"0.1em" }}>{w.phase}</span>
                  {w.status==="current" && <span style={{ marginLeft:8, background:"#E8FF00", color:"#111", fontSize:9, fontWeight:800, padding:"1px 7px", borderRadius:20, textTransform:"uppercase" }}>Atual</span>}
                  {w.race && <span style={{ marginLeft:8, fontSize:14 }}>🏅</span>}
                  <div style={{ fontSize:13, fontWeight:700, marginTop:2 }}>Semana {w.n} · {w.dates}</div>
                </div>
                <div style={{ display:"flex", gap:18 }}>

      </div>
    </div>
  );
}

const PAGES = [
  { id:"overview", icon:"⬤", label:"Visão Geral",   component:PageOverview  },
  { id:"fitness",  icon:"📈", label:"Fitness",       component:PageFitness   },
  { id:"library",  icon:"📚", label:"Biblioteca",    component:PageLibrary   },
  { id:"zones",    icon:"◉",  label:"Zonas",         component:PageZones     },
  { id:"plan",     icon:"📅", label:"Fitness Proj",  component:PagePlan      },
  { id:"projecao", icon:"🎯", label:"Estratégia",    component:PageProjecao  },
];

function App() {
  const [page, setPage] = useState("overview");
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [activities, setActivities] = useState([]);
  const [pmc, setPmc] = useState([]);
  const [plannedWorkouts, setPlannedWorkouts] = useState(() => {
    try { return JSON.parse(localStorage.getItem(PLANNED_KEY)) || []; } catch { return []; }
  });

  useEffect(() => {
    localStorage.setItem(PLANNED_KEY, JSON.stringify(plannedWorkouts));
  }, [plannedWorkouts]);

  useEffect(() => {
    async function load() {
      try {
        const { data: acts, error: e1 } = await sb.from("strava_activities").select("*").order("start_date", { ascending: false }).limit(30);
        if (e1) throw e1;
        const { data: pmcData, error: e2 } = await sb.from("daily_pmc").select("*").order("date", { ascending: true });
        if (e2) throw e2;
        setActivities(acts || []);
        setPmc(pmcData || []);
      } catch (err) {
        setError(String(err.message || err));
      } finally {
        setLoading(false);
      }
    }
    load();
  }, []);

  const daysOut = Math.ceil((RACE_DATE - new Date()) / 86400000);
  const latestPmc = pmc.length > 0 ? pmc[pmc.length - 1] : { ctl:0, atl:0, tsb:0 };

  if (loading) {
    return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", color:"#888" }}>Carregando dados do Supabase...</div>;
  }
  if (error) {
    return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", color:"#FF3333", padding:20, textAlign:"center" }}>Erro ao carregar dados: {error}</div>;
  }

  const pageInfo = PAGES.find(p => p.id === page) || PAGES[0];
  const Current = pageInfo.component;
  const pageProps = page === "overview" ? { activities, latestPmc, daysOut, plannedWorkouts }
                   : page === "fitness"  ? { pmc, latestPmc, plannedWorkouts }
                   : page === "plan"     ? { pmc, plannedWorkouts, setPlannedWorkouts }
                   : page === "zones"    ? { plannedWorkouts, activities }
                   : {};

  return (
    <div className="app-shell">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="race-target">Performance Dashboard</div>
          <div className="race-label">Chicago Marathon · Out 11</div>
          <div className="race-days"><span>{daysOut}</span> dias · <span>{Math.ceil(daysOut/7)}</span> semanas</div>
        </div>
        <nav className="sidebar-nav">
          {PAGES.map(p => (
            <button key={p.id} className={`nav-item ${page===p.id?"active":""}`} onClick={() => setPage(p.id)}>
              <span className="nav-icon">{p.icon}</span>{p.label}
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <p>GPS · VDOT 58 · LT2 393W<br/>Stryd · Garmin · Strava<br/>Dados ao vivo via Supabase</p>
        </div>
      </aside>

      <div style={{ display:"flex", flexDirection:"column", flex:1 }}>
        <header className="mobile-header">
          <div className="logo">2:48:00</div>
          <div style={{ fontSize:11, color:"#888" }}>Chicago · {daysOut}d</div>
        </header>
        <div className="mobile-tabs">
          {PAGES.map(p => (
            <button key={p.id} className={`mobile-tab ${page===p.id?"active":""}`} onClick={() => setPage(p.id)}>{p.label}</button>
          ))}
        </div>
        <main className="main-content">
          <Current {...pageProps} />
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
